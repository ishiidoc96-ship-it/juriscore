version: '3.8'

services:
  db:
    image: supabase/postgres:15.1.0.89
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: juriscore
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/juriscore
      - SUPABASE_URL=${SUPABASE_URL:-https://your-project.supabase.co}
      - SUPABASE_KEY=${SUPABASE_KEY:-your-anon-key}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - KENYALAW_BASE=https://www.kenyalaw.org
      - CORS_ORIGINS=*
    depends_on:
      - db
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  db-data:
